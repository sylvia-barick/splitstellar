name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GROUP_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_GROUP_CONTRACT_ID }}
          NEXT_PUBLIC_EXPENSE_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_EXPENSE_CONTRACT_ID }}
          NEXT_PUBLIC_SETTLEMENT_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_SETTLEMENT_CONTRACT_ID }}
          NEXT_PUBLIC_MONEY_REQUEST_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_MONEY_REQUEST_CONTRACT_ID }}
          NEXT_PUBLIC_ACTIVITY_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_ACTIVITY_CONTRACT_ID }}

      - name: Deployment Verification
        run: echo "Production deployment payload built and verified successfully."
